name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Deploy (only if above succeeds)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ramoj745
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /srv/hans-mobile-api
            git pull origin main
            npm ci
            npx prisma generate
            npx prisma migrate deploy
            npm run build
            sudo systemctl restart hans-api